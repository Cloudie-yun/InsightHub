<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InsightHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-white to-brand-50">
    <div class="min-h-screen flex items-center justify-center px-6">
        <div class="max-w-xl w-full bg-white/80 backdrop-blur-md border border-white shadow-2xl rounded-3xl p-10 text-center">
            <h1 class="text-3xl font-bold text-slate-900 mb-3">Welcome to InsightHub</h1>
            <p class="text-slate-600 mb-8">Log in or create an account to continue.</p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <button data-auth-open="login" class="px-6 py-3 rounded-xl bg-brand-600 text-white font-semibold hover:bg-brand-700 transition-colors">
                    Log In
                </button>
                <button data-auth-open="signup" class="px-6 py-3 rounded-xl border border-slate-200 text-slate-700 font-semibold hover:bg-slate-50 transition-colors">
                    Sign Up
                </button>
            </div>
            <a href="/dashboard" class="inline-flex items-center gap-2 text-xs text-slate-500 mt-6 hover:text-slate-700">
                <i class="fa-solid fa-arrow-left"></i>
                Back to app
            </a>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" data-auth-close></div>
        <div class="relative z-10 w-full max-w-md mx-4 bg-white rounded-2xl shadow-2xl border border-slate-100">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                <div>
                    <h3 class="text-lg font-bold text-slate-900" id="auth-title">Welcome Back</h3>
                    <p class="text-xs text-slate-500" id="auth-subtitle">Log in to continue</p>
                </div>
                <button class="h-9 w-9 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors" data-auth-close>
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="px-6 py-5">
                <!-- Login -->
                <form id="auth-login" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
                        <input type="email" placeholder="you@example.com" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                        <input type="password" placeholder="••••••••" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <button type="submit" class="w-full rounded-xl bg-brand-600 text-white font-semibold py-3 hover:bg-brand-700 transition-colors">
                        Log In
                    </button>
                    <div class="flex items-center gap-3 text-xs text-slate-400">
                        <div class="h-px flex-1 bg-slate-200"></div>
                        <span>OR</span>
                        <div class="h-px flex-1 bg-slate-200"></div>
                    </div>
                    <button type="button" class="w-full rounded-xl border border-slate-200 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                        Continue with Google
                    </button>
                    <p class="text-xs text-slate-500 text-center">
                        New here?
                        <button type="button" class="text-brand-700 font-semibold" data-auth-open="signup">Create an account</button>
                    </p>
                </form>

                <!-- Signup -->
                <form id="auth-signup" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Name</label>
                        <input type="text" placeholder="Your name" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
                        <input type="email" placeholder="you@example.com" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                        <input type="password" placeholder="Create a password" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <button type="submit" class="w-full rounded-xl bg-brand-600 text-white font-semibold py-3 hover:bg-brand-700 transition-colors">
                        Sign Up
                    </button>
                    <div class="flex items-center gap-3 text-xs text-slate-400">
                        <div class="h-px flex-1 bg-slate-200"></div>
                        <span>OR</span>
                        <div class="h-px flex-1 bg-slate-200"></div>
                    </div>
                    <button type="button" class="w-full rounded-xl border border-slate-200 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                        Continue with Google
                    </button>
                    <p class="text-xs text-slate-500 text-center">
                        Already have an account?
                        <button type="button" class="text-brand-700 font-semibold" data-auth-open="login">Log in</button>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        const authModal = document.getElementById("auth-modal");
        const loginForm = document.getElementById("auth-login");
        const signupForm = document.getElementById("auth-signup");
        const authTitle = document.getElementById("auth-title");
        const authSubtitle = document.getElementById("auth-subtitle");

        const setAuthMode = (mode) => {
            const isLogin = mode === "login";
            loginForm.classList.toggle("hidden", !isLogin);
            signupForm.classList.toggle("hidden", isLogin);
            authTitle.textContent = isLogin ? "Welcome Back" : "Create Your Account";
            authSubtitle.textContent = isLogin ? "Log in to continue" : "Sign up in seconds";
        };

        const openAuth = (mode) => {
            setAuthMode(mode);
            authModal.classList.remove("hidden");
            authModal.classList.add("flex");
        };

        const closeAuth = () => {
            authModal.classList.add("hidden");
            authModal.classList.remove("flex");
        };

        document.querySelectorAll("[data-auth-open]").forEach((el) => {
            el.addEventListener("click", () => openAuth(el.dataset.authOpen));
        });
        document.querySelectorAll("[data-auth-close]").forEach((el) => {
            el.addEventListener("click", closeAuth);
        });
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeAuth();
        });

        openAuth("login");
    </script>
</body>
</html>
