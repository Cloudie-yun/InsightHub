<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightHub</title>
    <!-- Website Icon-->
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Custom Config for specific colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar for sleek look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .sidebar-collapsed .sidebar { width: 58px; }
        .sidebar-collapsed .sidebar-brand { display: none;}
        .sidebar-collapsed .sidebar-label { opacity: 0; width: 0; height: 0; overflow: hidden; }
        .sidebar-collapsed .sidebar-search { display: none; }
        .sidebar-collapsed .sidebar-new-chat span { display: none; }
        .sidebar-collapsed #convo-submenu { display: none; }
        .sidebar-collapsed #sidebar-toggle { align-self: center; height: 2rem; width: 2rem; }
        .sidebar-collapsed .sidebar-user-info { display: none; }
        .sidebar-collapsed .sidebar-auth-buttons { flex-direction: column; gap: 0.5rem; }
        .sidebar-collapsed .sidebar-auth-buttons button span { display: none; }
        .sidebar-collapsed .sidebar-new-chat { padding: 0.5rem; min-height: 2.25rem; border-radius: 0.5rem; }
        .sidebar-collapsed nav { padding: 0.5rem; }
        .sidebar-collapsed nav > a,
        .sidebar-collapsed #convo-toggle {
            justify-content: center;
            gap: 0;
            border-radius: 0.5rem;
        }
        .sidebar-collapsed nav > a i,
        .sidebar-collapsed nav > button i
        .sidebar-collapsed #convo-toggle i { font-size: 1.25rem; width: auto; }
        .sidebar-collapsed #auth-section,
        .sidebar-collapsed #user-section { padding: 0.5rem; }
        .sidebar-collapsed .sidebar-auth-buttons button { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .sidebar-collapsed .sidebar-theme { display: none; }
        #convo-caret { opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease; }
        #convo-toggle:hover #convo-caret,
        #convo-toggle:focus-visible #convo-caret { opacity: 1; }

        /* ========== CUSTOM PLACEHOLDER STYLES ========== */
        .custom-placeholder {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        
        .password-placeholder {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .password-placeholder i {
            color: #94a3b8;
        }
        
        /* ========== INPUT ERROR STATE ========== */
        .auth-input-error {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }
        
        .auth-input-error:focus {
            ring-color: #ef4444 !important;
            border-color: #ef4444 !important;
        }
        
        /* ========== PASSWORD STRENGTH DROPDOWN ========== */
        #password-strength-dropdown {
            animation: slideDown 0.2s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #password-strength-dropdown.hidden {
            display: none;
        }
        
        #password-strength-dropdown ul li {
            transition: all 0.2s ease;
        }
        
        #password-strength-dropdown ul li i {
            transition: all 0.2s ease;
        }
        
        body.theme-light { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
        body.theme-dark { background-color: #0b1220; color: #e2e8f0; font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
        body.theme-dark .sidebar { background-color: #0f172a; border-color: #1f2937; }
        body.theme-dark .bg-white { background-color: #0f172a !important; }
        body.theme-dark .bg-slate-50 { background-color: #0b1220 !important; }
        body.theme-dark .bg-slate-100 { background-color: #1f2937 !important; }
        body.theme-dark .bg-gray-50 { background-color: #111827 !important; }
        body.theme-dark .bg-gray-100 { background-color: #1f2937 !important; }
        body.theme-dark .bg-brand-50 { background-color: rgba(139, 92, 246, 0.16) !important; }
        body.theme-dark .bg-brand-100 { background-color: rgba(139, 92, 246, 0.24) !important; }
        body.theme-dark .bg-purple-100 { background-color: rgba(139, 92, 246, 0.22) !important; }
        body.theme-dark .bg-red-50 { background-color: rgba(239, 68, 68, 0.12) !important; }
        body.theme-dark .bg-red-400 { background-color: #dc2626 !important; }
        body.theme-dark .hover\:bg-gray-50:hover { background-color: #1f2937 !important; }
        body.theme-dark .hover\:bg-gray-100:hover { background-color: #1f2937 !important; }
        body.theme-dark .hover\:bg-brand-50:hover { background-color: rgba(139, 92, 246, 0.24) !important; }
        body.theme-dark .hover\:bg-brand-100:hover { background-color: rgba(139, 92, 246, 0.32) !important; }
        body.theme-dark .border-gray-100 { border-color: #1f2937 !important; }
        body.theme-dark .border-gray-200 { border-color: #334155 !important; }
        body.theme-dark .border-slate-100 { border-color: #1f2937 !important; }
        body.theme-dark .border-slate-200 { border-color: #334155 !important; }
        body.theme-dark .border-brand-200 { border-color: rgba(139, 92, 246, 0.36) !important; }
        body.theme-dark .border-brand-300 { border-color: rgba(139, 92, 246, 0.45) !important; }
        body.theme-dark .border-red-500 { border-color: rgba(239, 68, 68, 0.65) !important; }
        body.theme-dark .text-slate-900 { color: #f1f5f9 !important; }
        body.theme-dark .text-slate-800 { color: #e2e8f0 !important; }
        body.theme-dark .text-slate-700 { color: #cbd5e1 !important; }
        body.theme-dark .text-slate-600 { color: #cbd5e1 !important; }
        body.theme-dark .text-slate-500 { color: #94a3b8 !important; }
        body.theme-dark .text-slate-400 { color: #94a3b8 !important; }
        body.theme-dark .text-gray-900 { color: #f1f5f9 !important; }
        body.theme-dark .text-gray-800 { color: #e2e8f0 !important; }
        body.theme-dark .text-gray-700 { color: #cbd5e1 !important; }
        body.theme-dark .text-gray-600 { color: #cbd5e1 !important; }
        body.theme-dark .text-gray-500 { color: #94a3b8 !important; }
        body.theme-dark .text-gray-400 { color: #64748b !important; }
        body.theme-dark .text-purple-600 { color: #c4b5fd !important; }
        body.theme-dark .text-brand-700 { color: #c4b5fd !important; }
        body.theme-dark .text-brand-800 { color: #ddd6fe !important; }
        body.theme-dark .text-brand-900 { color: #ede9fe !important; }
        body.theme-dark input::placeholder { color: #64748b; }
        body.theme-dark input { color: #e2e8f0; }
        body.theme-dark .shadow-sm,
        body.theme-dark .shadow-md,
        body.theme-dark .shadow-2xl { box-shadow: 0 10px 25px rgba(2, 6, 23, 0.45) !important; }
        body.theme-dark button.bg-white,
        body.theme-dark a.bg-white,
        body.theme-dark .bg-white.border { background-color: #111827 !important; }
        body.theme-dark button[class*="bg-brand-50"] { color: #ddd6fe !important; }
        body.theme-dark button[class*="bg-brand-600"] { background-color: #7c3aed !important; }
        body.theme-dark button[class*="bg-brand-600"]:hover { background-color: #6d28d9 !important; }
        body.theme-dark [class*="rounded-full"].bg-brand-100 { background-color: rgba(139, 92, 246, 0.3) !important; }
        body.theme-dark [class*="rounded-full"] { background-color: rgba(139, 92, 246, 0.3) !important; }
        body.theme-dark .theme-option { border-color: #334155 !important; background-color: #0f172a !important; color: #cbd5e1; }
        body.theme-dark .theme-option:hover { background-color: #1f2937 !important; }
        body.theme-dark .theme-option.active { border-color: #8b5cf6 !important; color: #ddd6fe; background-color: rgba(139, 92, 246, 0.12) !important; }
        body.theme-dark .convo-history-list { background: #111827; border-color: #334155; }
        body.theme-dark .convo-history-item { color: #94a3b8; }
        body.theme-dark .convo-history-item:hover { background: #1f2937; color: #e2e8f0; }
        body.theme-dark .convo-history-dot { background: #64748b; }
        /* Custom styles for auth modal in dark theme */
        body.theme-dark .custom-placeholder { color: #64748b !important; }
        body.theme-dark .password-placeholder i { color: #64748b !important; }
        body.theme-dark .auth-input-error { border-color: #dc2626 !important; background-color: rgba(239, 68, 68, 0.12) !important; }
        /* Password strength dropdown dark theme */
        body.theme-dark #password-strength-dropdown { background-color: #1f2937 !important; border-color: #334155 !important; }
        body.theme-dark #password-strength-dropdown p { color: #cbd5e1 !important; }
        .auth-input-error { border-color: #ef4444 !important; }
    </style>
</head>
<body class="theme-light bg-slate-50 text-slate-800 leading-normal tracking-normal text-justify font-sans text-base h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-64 bg-white border-r border-gray-200 flex flex-col h-full flex-shrink-0 transition-all duration-300">
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Logo & Toggle -->
            <div class="h-14 flex items-center justify-center px-4 border-b border-gray-100 flex-shrink-0">
                <a href="/dashboard" class="sidebar-brand text-xl font-bold tracking-tight text-brand-700 flex items-center gap-2 flex-1 min-w-0">
                    <img src="/static/images/favicon.png" alt="Logo" class="sidebar-logo h-9 w-9 flex-shrink-0"/>
                    <span class="sidebar-label truncate">InsightHub</span>
                </a>
                <button id="sidebar-toggle" class="h-9 w-9 rounded-lg text-slate-600 hover:bg-brand-100 transition-colors flex items-center justify-center flex-shrink-0" aria-label="Toggle sidebar">
                    <span class="material-symbols-outlined">
                        dock_to_right
                    </span>
                </button>
            </div>

            <div class="border-t border-gray-100"></div>

            <!-- Main Nav - Scrollable -->
            <nav class="p-4 space-y-1 flex-1 overflow-y-auto">
                <!-- Search Bar -->
                <div class="space-y-1 sidebar-search">
                    <div class="relative">
                        <input type="text" placeholder="Search conversations..." 
                            class="w-full h-12 pl-4 pr-10 py-2 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all text-sm">
                        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">
                            search
                        </span>
                    </div>
                </div>

                <!--New Chat Button-->
                <div class="space-y-1 pt-5">
                    <button class="sidebar-new-chat w-full flex items-center gap-3 px-4 py-2 rounded-lg text-base font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors">
                        <i class="fa-solid fa-square-plus text-xl w-6 flex-shrink-0"></i>
                        <span class="sidebar-label">New Chat</span>
                    </button>
                </div>

                <a href="/dashboard" class="flex items-center gap-3 px-4 py-2 rounded-lg transition-colors {{ 'bg-brand-50 text-brand-700 font-medium' if active_page == 'dashboard' else 'text-gray-500 hover:bg-gray-100 hover:text-gray-900' }}">
                    <i class="fa-solid fa-house text-lg w-6 flex-shrink-0"></i>
                    <span class="sidebar-label">Dashboard</span>
                </a>
                
                <div class="space-y-1">
                    <button type="button" id="convo-toggle" class="w-full justify-center align-self-center flex items-center gap-3 px-4 py-2 rounded-lg transition-colors group {{ 'bg-brand-50 text-brand-700 font-medium' if active_page == 'chat' else 'text-gray-500 hover:bg-gray-100 hover:text-gray-900' }}">
                        <i class="fa-solid fa-comments text-lg w-6 flex-shrink-0 "></i>
                        <span class="sidebar-label flex-1 text-left">Conversations</span>
                        <i id="convo-caret" class="fa-solid fa-chevron-down text-xs transition-transform sidebar-label"></i>
                    </button>
                    <div id="convo-submenu" class="pl-3 pr-3 space-y-1">
                        <!-- Conversation History -->
                        <a href="/chat" class="block px-3 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-gray-100 rounded-md truncate">
                            Introduction to Machine Learning
                        </a>
                        <a href="/chat" class="block px-3 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-gray-100 rounded-md truncate">
                            Python Best Practices
                        </a>
                        <a href="/chat" class="block px-3 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-gray-100 rounded-md truncate">
                            Data Structures Overview
                        </a>
                        <a href="/chat" class="block px-3 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-gray-100 rounded-md truncate">
                            API Design Patterns
                        </a>
                        <a href="/chat" class="block px-3 py-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-gray-100 rounded-md truncate">
                            Database Optimization Tips
                        </a>
                    </div>
            </nav>
        </div>

        <!-- Sidebar Footer -->
        <div class="border-t border-gray-100 flex-shrink-0">
            <div class="sidebar-theme p-4 border-b border-gray-100">
                <p class="sidebar-label text-xs font-semibold uppercase tracking-wide text-gray-400 mb-2">Theme</p>
                <div class="grid grid-cols-2 gap-2">
                    <label id="theme-light-option" class="theme-option active flex items-center justify-center gap-2 cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-xs font-semibold text-gray-600 hover:bg-gray-50 transition-colors">
                        <input type="radio" id="theme-light" name="theme-mode" value="light" class="sr-only" checked>
                        <i class="fa-regular fa-sun"></i>
                        <span class="sidebar-label">Light</span>
                    </label>
                    <label id="theme-dark-option" class="theme-option flex items-center justify-center gap-2 cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-xs font-semibold text-gray-600 hover:bg-gray-50 transition-colors">
                        <input type="radio" id="theme-dark" name="theme-mode" value="dark" class="sr-only">
                        <i class="fa-regular fa-moon"></i>
                        <span class="sidebar-label">Dark</span>
                    </label>
                </div>
            </div>

            <!-- User Section (when logged in) -->
            <div id="user-section" class="p-4 hidden">
                <div class="flex items-center gap-3">
                    <div class="h-10 w-10 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center font-bold text-lg border-2 border-white shadow-sm flex-shrink-0">
                        Y
                    </div>
                    <div class="sidebar-user-info flex-1 min-w-0">
                        <div class="text-sm font-bold text-gray-900 truncate">Yunite</div>
                        <div class="text-xs text-gray-500 truncate">yunite@gmail.com</div>
                    </div>
                    <button class="sidebar-label h-8 w-8 rounded-lg text-slate-500 hover:bg-gray-100 transition-colors flex items-center justify-center" title="Settings">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
            </div>

            <!-- Auth Buttons (when not logged in) -->
            <div id="auth-section" class="p-4 ">
                <div class="sidebar-auth-buttons flex flex-col gap-2">
                    <button data-auth-open="login" class="w-full px-4 py-2.5 text-sm font-semibold text-brand-700 bg-brand-50 rounded-lg hover:bg-brand-100 transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        <span>Log In</span>
                    </button>
                    <button data-auth-open="signup" class="w-full px-4 py-2.5 text-sm font-semibold text-white bg-brand-600 rounded-lg hover:bg-brand-700 transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-user-plus"></i>
                        <span>Sign Up</span>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col h-full min-w-0">
        <!-- Page Content Injection -->
        <main class="flex-1 overflow-auto bg-slate-50 relative min-w-0">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% include "partials/auth_modal.html" %}

    <script src="/static/script/base.js"></script>
</body>
</html>
