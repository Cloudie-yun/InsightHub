<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightHub</title>
    <!-- Website Icon-->
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Config for specific colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar for sleek look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between h-full flex-shrink-0 transition-all duration-300">
        <div>
            <!-- Logo -->
            <div class="h-16 flex items-center px-6 border-b border-gray-100">
                <a href="/dashboard" class="text-2xl font-bold tracking-tight text-brand-700 flex items-center gap-2">
                    <img src="/static/images/favicon.png" alt="Logo" class="h-9 w-9"/>
                    InsightHub
                </a>
            </div>

            <!-- Main Nav -->
            <nav class="p-4 space-y-2">
                <a href="/dashboard" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {{ 'bg-brand-50 text-brand-700 font-medium' if active_page == 'dashboard' else 'text-gray-500 hover:bg-gray-50 hover:text-gray-900' }}">
                    <i class="fa-solid fa-house text-lg w-6"></i>
                    Dashboard
                </a>
                <a href="/chat" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {{ 'bg-brand-50 text-brand-700 font-medium' if active_page == 'chat' else 'text-gray-500 hover:bg-gray-50 hover:text-gray-900' }}">
                    <i class="fa-regular fa-comment-dots text-lg w-6"></i>
                    Conversations
                </a>
            </nav>

            <!-- Study Aids Section -->
            <div class="px-4 mt-4">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 px-2">Study Aids</h3>
                <nav class="space-y-2">
                    <a href="/mindmap" class="flex items-center gap-3 px-4 py-2 rounded-lg transition-colors {{ 'text-brand-700 bg-brand-50 font-medium' if active_page == 'mindmap' else 'text-gray-500 hover:bg-gray-50 hover:text-gray-900' }}">
                        <i class="fa-solid fa-diagram-project w-6"></i>
                        Mind Map
                    </a>
                    <a href="/flashcards" class="flex items-center gap-3 px-4 py-2 rounded-lg transition-colors {{ 'text-brand-700 bg-brand-50 font-medium' if active_page == 'flashcards' else 'text-gray-500 hover:bg-gray-50 hover:text-gray-900' }}">
                        <i class="fa-solid fa-clone w-6"></i>
                        Flash Cards
                    </a>
                </nav>
            </div>
        </div>

        <!-- Sidebar Footer Spacer -->
        <div class="p-4 border-t border-gray-100"></div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col h-full min-w-0">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0">
            <!-- Search -->
            <div class="w-full max-w-lg relative">
                <input type="text" placeholder="Search documents, conversations..." 
                       class="w-full pl-4 pr-4 py-2 rounded-full border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all">
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
            </div>

            <!-- User / Auth Actions -->
            <div class="flex items-center gap-4 ml-4">
                <div class="text-right hidden sm:block">
                    <div class="text-sm font-bold text-gray-900">Yunite</div>
                    <div class="text-xs text-gray-500">yunite@gmail.com</div>
                </div>
                <div class="h-10 w-10 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center font-bold text-lg border-2 border-white shadow-sm">
                    Y
                </div>
                <div class="flex items-center gap-2">
                    <button data-auth-open="login" class="px-3 py-2 text-xs font-semibold text-brand-700 bg-brand-50 rounded-lg hover:bg-brand-100 transition-colors">
                        Log In
                    </button>
                    <button data-auth-open="signup" class="px-3 py-2 text-xs font-semibold text-white bg-brand-600 rounded-lg hover:bg-brand-700 transition-colors">
                        Sign Up
                    </button>
                </div>
            </div>
        </header>

        <!-- Page Content Injection -->
        <main class="flex-1 overflow-auto bg-slate-50 relative">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" data-auth-close></div>
        <div class="relative z-10 w-full max-w-md mx-4 bg-white rounded-2xl shadow-2xl border border-slate-100">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                <div>
                    <h3 class="text-lg font-bold text-slate-900" id="auth-title">Welcome Back</h3>
                    <p class="text-xs text-slate-500" id="auth-subtitle">Log in to continue</p>
                </div>
                <button class="h-9 w-9 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors" data-auth-close>
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="px-6 py-5">
                <!-- Login -->
                <form id="auth-login" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
                        <input type="email" placeholder="you@example.com" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                        <input type="password" placeholder="********" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <button type="submit" class="w-full rounded-xl bg-brand-600 text-white font-semibold py-3 hover:bg-brand-700 transition-colors">
                        Log In
                    </button>
                    <div class="flex items-center gap-3 text-xs text-slate-400">
                        <div class="h-px flex-1 bg-slate-200"></div>
                        <span>OR</span>
                        <div class="h-px flex-1 bg-slate-200"></div>
                    </div>
                    <button type="button" class="w-full rounded-xl border border-slate-200 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                        Continue with Google
                    </button>
                    <p class="text-xs text-slate-500 text-center">
                        New here?
                        <button type="button" class="text-brand-700 font-semibold" data-auth-open="signup">Create an account</button>
                    </p>
                </form>

                <!-- Signup -->
                <form id="auth-signup" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Name</label>
                        <input type="text" placeholder="Your name" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
                        <input type="email" placeholder="you@example.com" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                        <input type="password" placeholder="Create a password" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <button type="submit" class="w-full rounded-xl bg-brand-600 text-white font-semibold py-3 hover:bg-brand-700 transition-colors">
                        Sign Up
                    </button>
                    <div class="flex items-center gap-3 text-xs text-slate-400">
                        <div class="h-px flex-1 bg-slate-200"></div>
                        <span>OR</span>
                        <div class="h-px flex-1 bg-slate-200"></div>
                    </div>
                    <button type="button" class="w-full rounded-xl border border-slate-200 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                        Continue with Google
                    </button>
                    <p class="text-xs text-slate-500 text-center">
                        Already have an account?
                        <button type="button" class="text-brand-700 font-semibold" data-auth-open="login">Log in</button>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        const authModal = document.getElementById("auth-modal");
        const loginForm = document.getElementById("auth-login");
        const signupForm = document.getElementById("auth-signup");
        const authTitle = document.getElementById("auth-title");
        const authSubtitle = document.getElementById("auth-subtitle");

        const setAuthMode = (mode) => {
            const isLogin = mode === "login";
            loginForm.classList.toggle("hidden", !isLogin);
            signupForm.classList.toggle("hidden", isLogin);
            authTitle.textContent = isLogin ? "Welcome Back" : "Create Your Account";
            authSubtitle.textContent = isLogin ? "Log in to continue" : "Sign up in seconds";
        };

        const openAuth = (mode) => {
            setAuthMode(mode);
            authModal.classList.remove("hidden");
            authModal.classList.add("flex");
        };

        const closeAuth = () => {
            authModal.classList.add("hidden");
            authModal.classList.remove("flex");
        };

        document.querySelectorAll("[data-auth-open]").forEach((el) => {
            el.addEventListener("click", () => openAuth(el.dataset.authOpen));
        });
        document.querySelectorAll("[data-auth-close]").forEach((el) => {
            el.addEventListener("click", closeAuth);
        });
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeAuth();
        });
    </script>
</body>
</html>
