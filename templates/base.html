<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightHub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Config for specific colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar for sleek look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between h-full flex-shrink-0 transition-all duration-300">
        <div>
            <!-- Logo -->
            <div class="h-16 flex items-center px-6 border-b border-gray-100">
                <a href="/dashboard" class="text-2xl font-bold tracking-tight text-brand-700 flex items-center gap-2">
                    <i class="fa-solid fa-layer-group"></i> InsightHub
                </a>
            </div>

            <!-- Main Nav -->
            <nav class="p-4 space-y-2">
                <a href="/dashboard" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {{ 'bg-brand-50 text-brand-700 font-medium' if active_page == 'dashboard' else 'text-gray-500 hover:bg-gray-50 hover:text-gray-900' }}">
                    <i class="fa-solid fa-house text-lg w-6"></i>
                    Dashboard
                </a>
                <a href="/chat" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {{ 'bg-brand-50 text-brand-700 font-medium' if active_page == 'chat' else 'text-gray-500 hover:bg-gray-50 hover:text-gray-900' }}">
                    <i class="fa-regular fa-comment-dots text-lg w-6"></i>
                    Conversations
                </a>
            </nav>

            <!-- Study Aids Section -->
            <div class="px-4 mt-4">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 px-2">Study Aids</h3>
                <nav class="space-y-2">
                    <a href="/mindmap" class="flex items-center gap-3 px-4 py-2 rounded-lg transition-colors {{ 'text-brand-700 bg-brand-50 font-medium' if active_page == 'mindmap' else 'text-gray-500 hover:bg-gray-50 hover:text-gray-900' }}">
                        <i class="fa-solid fa-diagram-project w-6"></i>
                        Mind Map
                    </a>
                    <a href="/flashcards" class="flex items-center gap-3 px-4 py-2 rounded-lg transition-colors {{ 'text-brand-700 bg-brand-50 font-medium' if active_page == 'flashcards' else 'text-gray-500 hover:bg-gray-50 hover:text-gray-900' }}">
                        <i class="fa-solid fa-clone w-6"></i>
                        Flash Cards
                    </a>
                </nav>
            </div>
        </div>

        <!-- User Profile (Bottom Sidebar) -->
        <div class="p-4 border-t border-gray-100">
            <a href="/login" class="flex items-center gap-3 px-2 py-2 text-gray-500 hover:text-red-500 transition-colors">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>Log Out</span>
            </a>
        </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col h-full min-w-0">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0">
            <!-- Search -->
            <div class="w-full max-w-lg relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input type="text" placeholder="Search documents, conversations..." 
                       class="w-full pl-10 pr-4 py-2 rounded-full border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all">
            </div>

            <!-- User Info -->
            <div class="flex items-center gap-4 ml-4">
                <div class="text-right hidden sm:block">
                    <div class="text-sm font-bold text-gray-900">Yunite</div>
                    <div class="text-xs text-gray-500">yunite@gmail.com</div>
                </div>
                <div class="h-10 w-10 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center font-bold text-lg border-2 border-white shadow-sm">
                    Y
                </div>
            </div>
        </header>

        <!-- Page Content Injection -->
        <main class="flex-1 overflow-auto bg-slate-50 relative">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
